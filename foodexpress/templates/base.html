<!DOCTYPE html>
<html>
<head>
<title>FoodExpress</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 relative">

<!-- 🌄 Background Image -->
<div class="fixed inset-0 -z-10 bg-cover bg-center"
style="background-image: url('https://images.unsplash.com/photo-1504674900247-0877df9cc836');">
</div>

<!-- 🌑 Dark Overlay -->
<div class="fixed inset-0 -z-10 bg-black opacity-40"></div>

<!-- 🔴 Navbar -->
<nav class="bg-red-500 text-white px-6 py-4 flex justify-between items-center shadow-md">

<h1 class="text-xl font-bold tracking-wide">
    FoodExpress 🍔
</h1>

<div class="flex gap-4 items-center">

<!-- 🏠 Home -->
<a href="/" class="bg-white text-red-500 p-2 rounded hover:scale-110 transition">

<svg xmlns="http://www.w3.org/2000/svg"
fill="none" viewBox="0 0 24 24"
stroke-width="1.5" stroke="currentColor"
class="w-5 h-5">

<path stroke-linecap="round"
stroke-linejoin="round"
d="M3 12l9-9 9 9M4.5 10.5V21h15V10.5"/>

</svg>

</a>

<!-- 🔍 Search -->
<a href="/search/" class="bg-white text-red-500 p-2 rounded hover:scale-110 transition">

<svg xmlns="http://www.w3.org/2000/svg"
fill="none" viewBox="0 0 24 24"
stroke-width="1.5" stroke="currentColor"
class="w-5 h-5">

<path stroke-linecap="round"
stroke-linejoin="round"
d="M21 21l-4.35-4.35m1.85-5.65
a7.5 7.5 0 11-15 0
7.5 7.5 0 0115 0z"/>

</svg>

</a>

<!-- 🛒 Cart -->
<a href="/cart/" class="bg-white text-red-500 p-2 rounded hover:scale-110 transition">

<svg xmlns="http://www.w3.org/2000/svg"
fill="none" viewBox="0 0 24 24"
stroke-width="1.5" stroke="currentColor"
class="w-5 h-5">

<path stroke-linecap="round"
stroke-linejoin="round"
d="M2.25 2.25h1.5l2.25 10.5h11.25l2.25-7.5H6.75"/>

<circle cx="9" cy="20" r="1"/>
<circle cx="18" cy="20" r="1"/>

</svg>

</a>

{% if user.is_authenticated %}

<!-- 👤 Profile -->
<a href="{% url 'profile' %}" class="bg-white text-red-500 p-2 rounded hover:scale-110 transition">

<svg xmlns="http://www.w3.org/2000/svg"
fill="none" viewBox="0 0 24 24"
stroke-width="1.5" stroke="currentColor"
class="w-5 h-5">

<path stroke-linecap="round"
stroke-linejoin="round"
d="M15.75 6.75a3.75 3.75 0 11-7.5 0
3.75 3.75 0 017.5 0zM4.5 20.25
a8.25 8.25 0 0115 0"/>

</svg>

</a>

<!-- 🚪 Logout -->
<a href="/logout/" class="bg-white text-red-500 px-3 py-1 rounded hover:bg-gray-100 transition">
Logout
</a>

{% else %}

<!-- 🔐 Login -->
<a href="/accounts/login/" class="bg-white text-red-500 px-3 py-1 rounded hover:bg-gray-100 transition">
Login
</a>

<!-- 📝 Signup -->
<a href="/signup/" class="bg-white text-red-500 px-3 py-1 rounded hover:bg-gray-100 transition">
Signup
</a>

{% endif %}

</div>

</nav>

<!-- 📦 Page Content -->
<div class="container mx-auto p-6">

<div class="bg-white/80 backdrop-blur-sm p-6 rounded-xl shadow-lg max-w-6xl mx-auto">

{% block content %}
{% endblock %}

</div>

</div>

</body>
</html>
