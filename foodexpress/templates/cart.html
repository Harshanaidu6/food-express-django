{% extends 'base.html' %}

{% block content %}

<h2 class="text-2xl font-bold mb-6">Your Cart</h2>

{% for item in items %}

<div class="bg-white p-4 shadow mb-3 flex justify-between items-center">

<!-- Item Details -->
<div>
<h3 class="font-bold text-lg">{{ item.item.name }}</h3>
<p>₹{{ item.item.price }}</p>
</div>

<!-- Quantity Controls -->
<div class="flex items-center gap-3">

<a href="{% url 'decrease' item.id %}"
class="bg-gray-300 px-3 py-1 rounded">-</a>

<span class="font-bold">{{ item.quantity }}</span>

<a href="{% url 'increase' item.id %}"
class="bg-gray-300 px-3 py-1 rounded">+</a>

</div>

<!-- Remove Button -->
<a href="{% url 'remove' item.id %}"
class="text-red-500 font-bold">
❌
</a>

</div>

{% endfor %}

<!-- Total -->
<h3 class="text-xl font-bold mt-4">
Total: ₹{{ total }}
</h3>

<form action="{% url 'checkout' %}" method="post">
    {% csrf_token %}
    <button class="bg-red-500 text-white px-4 py-2 rounded mt-4">
        Checkout
    </button>
</form>

{% endblock %}
